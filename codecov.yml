# Codecov configuration for modvx
# https://docs.codecov.com/docs/codecovyml-reference

coverage:
  status:
    project:
      default:
        target: auto 
        threshold: 1%  
    patch:
      default:
        target: auto
        threshold: 1%

comment:
  layout: "reach,diff,flags,files,footer"
  behavior: default 
  require_changes: false 

ignore:
  - "tests/**"
  - "setup.py"
  - "src/modvx/__init__.py"
