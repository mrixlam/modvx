# Benchmark config: 3 cycles, 4 thresholds, 8 windows = 96 work-units
# Used for serial vs multiprocessing timing comparison

experiment_name: "liuz_3_3dhyb_asrama_asrmhs_atms2018"

# MPAS mesh settings (update mpas_grid_file to point to your grid)
mpas_grid_file: "fcst/liuz_3_3dhyb_asrama_asrmhs_atms2018/grid/x1.grid.nc"
mpas_remap_resolution: 0.1

# 3 cycles for benchmark
initial_cycle_start: "20180419T00"
final_cycle_start:   "20180514T00"

forecast_step_hours:        12
observation_interval_hours:  1
cycle_interval_hours:       24
forecast_length_hours:      240

# Grid
target_resolution: "obs"

# Verification domain
vxdomain:
  - "GLOBAL"

# Full parameter sweep
thresholds:
  - 90.0
  - 95.0
  - 97.5
  - 99.0
window_sizes:
  - 1
  - 3
  - 5
  - 7
  - 9
  - 11
  - 13
  - 15

# Variable names
obs_var_name: "precip"

# Directories (relative to base_dir) — update base_dir for your system
base_dir: "/Users/mrislam/Documents/pandac/modvx"
fcst_dir: "fcst"
obs_dir:  "obs/FIMERG"
mask_dir: "masks"
output_dir: "output"
debug_dir: "debug"

# Obs vintage preference
obs_vintage_preference:
  - "FNL"
  - "LTE"
output_dir: "output"
debug_dir: "debug"

# Obs vintage preference (LTE files for June/July 2025)
obs_vintage_preference:
  - "FNL"
  - "LTE"

# Runtime
verbose: false
save_intermediate: false
enable_logs: false
