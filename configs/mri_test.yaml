# Configuration for mri_test experiment: native MPAS unstructured mesh
# Uses mpasdiag for direct reading of MPAS diag files (no convert-mpas needed)

experiment_name: "mrislam_coldstart_60km2024"

# MPAS mesh settings
mpas_grid_file: "tests/testdata/grid/x1.163842.grid.nc"
mpas_remap_resolution: 0.5  # degrees for MPAS-to-latlon remapping

# Cycle range (5 cycles available: 2024091700 – 2024092100)
initial_cycle_start: "20240917T00"
final_cycle_start:   "20240921T00"

# MPAS diag files are hourly; accumulate over 1h windows
forecast_step_hours:        1
observation_interval_hours:  1
cycle_interval_hours:       24
forecast_length_hours:       6

# Grid — regrid to obs grid after MPAS remapping
target_resolution: "fcst"

# Verification domain
vxdomain:
  - "GLOBAL"

# Parameter sweep
thresholds:
  - 90.0
  - 95.0
  - 97.5
  - 99.0
window_sizes:
  - 1
  - 3
  - 5
  - 7
  - 9
  - 11
  - 13
  - 15

# Variable names (obs loading)
obs_var_name: "precip"

# Directories (relative to base_dir)
base_dir: "/Users/mrislam/Documents/NCAR/modvx"
fcst_dir: "tests/testdata/data/fcst"
obs_dir:  "tests/testdata/data/obs"
mask_dir: "tests/testdata/data/masks"
output_dir: "tests/testdata/data/output"
debug_dir: "tests/testdata/data/debug"

# Obs vintage preference
obs_vintage_preference:
  - "FNL"
  - "LTE"

# Runtime
verbose: false
save_intermediate: false
enable_logs: false
